name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install engine deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run engine tests
        run: pytest

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - name: Install API deps
        run: npm ci
      - name: Build API
        run: npm run build
      - name: Lint API
        run: npm run lint
      - name: Test API
        run: npm run test
